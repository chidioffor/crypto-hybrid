version: '3.8'

x-service-defaults: &service-defaults
  env_file:
    - .env
  networks:
    - cryptohybrid-network

services:
  # Database Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptohybridbank}
      POSTGRES_USER: ${POSTGRES_USER:-cryptohybrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cryptohybrid-network

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-cryptohybrid}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-change-me}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-cryptohybrid}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cryptohybrid-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cryptohybrid-network

  # API Gateway
  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3001}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-http://wallet-service:3002}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:3003}
      CARD_SERVICE_URL: ${CARD_SERVICE_URL:-http://card-service:3004}
    depends_on:
      - postgres
      - redis

  # User Service
  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
    depends_on:
      - postgres
      - redis

  # Wallet Service
  wallet-service:
    <<: *service-defaults
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY:-}
      FIREBLOCKS_API_KEY: ${FIREBLOCKS_API_KEY:-}
      FIREBLOCKS_SECRET_KEY: ${FIREBLOCKS_SECRET_KEY:-}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-}
      BSC_RPC_URL: ${BSC_RPC_URL:-}
    depends_on:
      - postgres
      - redis

  # Payment Service
  payment-service:
    <<: *service-defaults
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CHAINALYSIS_API_KEY: ${CHAINALYSIS_API_KEY:-}
    depends_on:
      - postgres
      - redis

  # Card Service
  card-service:
    <<: *service-defaults
    build:
      context: ./services/card-service
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CARD_DATA_ENCRYPTION_KEY: ${CARD_DATA_ENCRYPTION_KEY:-}
      CARD_PROVISION_TOKEN_TTL: ${CARD_PROVISION_TOKEN_TTL:-300}
      COLUMN_API_KEY: ${COLUMN_API_KEY:-}
      MARQETA_API_KEY: ${MARQETA_API_KEY:-}
    depends_on:
      - postgres
      - redis

  # Frontend
  frontend:
    <<: *service-defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3000}
    depends_on:
      - api-gateway

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - cryptohybrid-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3006:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cryptohybrid-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  grafana_data:

networks:
  cryptohybrid-network:
    driver: bridge

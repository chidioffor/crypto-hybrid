version: '3.8'

x-service-defaults: &service-defaults
  env_file:
    - .env
  networks:
    - cryptohybrid-network

services:
  # Database Services
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptohybridbank}
      POSTGRES_USER: ${POSTGRES_USER:-cryptohybrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cryptohybrid-network

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    networks:
      - cryptohybrid-network

  kafka:
    image: bitnami/kafka:3.6
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CLIENT_USERS=${KAFKA_SASL_USERNAME:-}
      - KAFKA_CLIENT_PASSWORDS=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - cryptohybrid-network

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-cryptohybrid}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-change-me}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-cryptohybrid}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cryptohybrid-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cryptohybrid-network

  # API Gateway
  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cryptohybrid}:${POSTGRES_PASSWORD:-change-me}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-cryptohybridbank}}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me}@redis:${REDIS_PORT:-6379}/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:3001}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-http://wallet-service:3002}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:3003}
      CARD_SERVICE_URL: ${CARD_SERVICE_URL:-http://card-service:3004}
